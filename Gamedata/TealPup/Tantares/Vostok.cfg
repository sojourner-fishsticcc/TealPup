@PART[andromeda_crew_s1_1]:FOR[RealismOverhaul]
{
	%RSSROConfig = True
	%RP0conf = True
	@rescaleFactor = 1.61
	//@manufacturer = #roMfrOKB1
	//@maxTemp = 1073.15
	@tags ^= :$: Vostok

	//TechRequired = spaceStationDev
}
@INTERNAL[andromeda_crew_s1_1_interior]:BEFORE[RealismOverhaul]
{
	%scaleAll = 1.61, 1.61, 1.61
}

//	================================================================================
//	Vostok Descent Module
//	================================================================================

@PART[andromeda_crew_s1_1]:FOR[RealismOverhaul]
{
	@mass = 0.933
	@title = Vostok Descent Module
	@description = A spherical descent module. Has an ejector seat for the pilot to parachute safely.
	@maxTemp = 600
	skinMaxTemp = 2350
	heatShieldDiameter = 4.4
	heatShieldTag = Mercury
	resetHeatShieldAblator = true
	resetHeatShieldMass = false

	MODULE:NEEDS[ConnectedLivingSpace]
	{
		name = ModuleConnectedLivingSpace
		passable = false
	}
	!RESOURCE[ElectricCharge]
	{ }
	!RESOURCE[LiquidFuel]
	{ }
	!RESOURCE[Oxidizer]
	{ }
	@MODULE[ModuleCommand]
	{
		minimumCrew = 0
		RESOURCE
		{
			name = ElectricCharge
			rate = 0.25
		}
	}
	MODULE
	{
		name = ModuleROEjectionSeat
		maxEjectSpeed = 900
		maxEjectAltitude = 30000

		SEAT
		{
			colliderOffset = 0.0, 0.35, -1.35
			colliderRotAngles = -62.0, 0.0, 0.0
			forceDir = 0.0, 0.4, -1.0
			ejectDelay = 0
		}
	}
	@MODULE[ModuleSAS]
	{
		SASServiceLevel = 3
	}
	@MODULE[ModuleScienceContainer]
	{
		reviewActionName = Review Stored Data
		storeActionName = Store Experiments
		storageRange = 3.0
	}
	MODULE
	{
		name = ModuleInventoryPart
		InventorySlots = 2
		packedVolumeLimit = 50
	}
	MODULE
	{
		name = ModuleFuelTanks
		volume = 600
		type = SM-II
		basemass = 0.933
		TANK
		{
			name = ElectricCharge
			amount = 232000
			maxAmount = 232000
		}
	}
	MODULE:NEEDS[!RemoteTech]
	{
		name = ModuleDataTransmitter
		antennaType = INTERNAL
		packetInterval = 1.0
		packetSize = 1.0
		requiredResource = ElectricCharge
		antennaPower = 400
		packetResourceCost = 0.004
	}
	MODULE:NEEDS[RemoteTech]
	{
		name = ModuleSPU
	}
	MODULE:NEEDS[RemoteTech]
	{
		name = ModuleRTAntennaPassive
		TechRequired = unlockParts

		OmniRange = 1000000

		TRANSMITTER
		{
			PacketInterval = 0.4
			PacketSize = 0.27
			PacketResourceCost = 0.025
		}
	}
}
@PART[andromeda_crew_s1_1]:BEFORE[RealAntennas]
{
	!MODULE[ModuleDataTransmitter],* {}
	MODULE
	{
		name = ModuleRealAntenna
		referenceGain = 1.5
		RFBand = UHF		//Default to UHF-band
	}
}
@PART[andromeda_crew_s1_1]:BEFORE[RealismOverhaul]:NEEDS[TacLifeSupport]
{
	@MODULE[ModuleFuelTanks]
	{
		TANK
		{
			name = Food
			amount = 58.5
			maxAmount = 58.5
		}
		TANK
		{
			name = Water
			amount = 38.67
			maxAmount = 38.67
		}
		TANK
		{
			name = Oxygen
			amount = 5328
			maxAmount = 5328
		}
		TANK
		{
			name = CarbonDioxide
			amount = 0
			maxAmount = 256
		}
		TANK
		{
			name = Waste
			amount = 0
			maxAmount = 31
		}
		TANK
		{
			name = WasteWater
			amount = 0
			maxAmount = 25
		}
		TANK
		{
			name = PotassiumSuperoxide
			amount = 7.5
			maxAmount = 7.5
		}
	}

	MODULE
	{
		name = TacGenericConverter
		converterName = CO2 Scrubber
		StartActionName = Start CO2 Scrubber
		StopActionName = Stop CO2 Scrubber
		tag = Life Support
		GeneratesHeat = False
		UseSpecialistBonus = True
		SpecialistEfficiencyFactor = 0.2
		SpecialistBonusBase = 0.05
		ExperienceEffect = ConverterSkill
		EfficiencyBonus = 1
		conversionRate = 1.0	// # of people - Figures based on per/person

		INPUT_RESOURCE
		{
			ResourceName = CarbonDioxide
			Ratio = 0.005921
		}

		INPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 0.01
		}

		INPUT_RESOURCE
		{
			ResourceName = PotassiumSuperoxide
			Ratio = 0.00001735323
		}

		OUTPUT_RESOURCE
		{
			ResourceName = Oxygen
			Ratio = 0.006851
			DumpExcess = True
		}

		OUTPUT_RESOURCE
		{
			ResourceName = Waste
			Ratio = 0.00006491
			DumpExcess = False
		}
	}
}
@PART[andromeda_crew_s1_1]:LAST[Tantares]
{
	!RESOURCE:HAS[~name[Ablator],~name[CharredAblator]],*{}
}