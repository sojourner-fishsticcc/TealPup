@PART[ROS-HingedSolarPanel]:NEEDS[Bluedog_DB]:BEFORE[ROSolar]
{
	@MODULE[ModuleROSolar]:HAS[!CORE:HAS[#variant[Mariner]]]
	{
		CORE
		{
			variant = Mariner
		}
	}
}

@PART[ROS-HingedSolarPanel]:NEEDS[Bluedog_DB]:BEFORE[ROSolar]
{
	@MODULE[ModuleROSolar]:HAS[!CORE:HAS[#variant[Ranger]]]
	{
		CORE
		{
			variant = Ranger
		}
	}
}


@PART[ROS-HingedSolarPanel]:NEEDS[Bluedog_DB]:AFTER[ROSolar]
{
	@MODULE[ModuleROSolar]
	{
		@CORE:HAS[#variant[Mariner]]
		{
			model = Mariner2_Solar_Basic_None
			model = Mariner2_Solar_Basic_Extended
			model = Mariner2_Solar_Basic_Sail
			model = Mariner2_TrackingSolar_Basic_None
			model = Mariner2_TrackingSolar_Basic_Extended
			model = Mariner2_TrackingSolar_Basic_Sail
			model = Mariner2_Solar_Antenna_None
			model = Mariner2_Solar_Antenna_Extended
			model = Mariner2_Solar_Antenna_Sail
			model = Mariner2_TrackingSolar_Antenna_None
			model = Mariner2_TrackingSolar_Antenna_Extended
			model = Mariner2_TrackingSolar_Antenna_Sail
			model = Mariner3_Solar_Angled
			model = Mariner3_Solar_Straight
			model = Mariner5_Solar_Angled
			model = Mariner5_Solar_Straight
			model = Mariner5_Solar_Antenna_Angled
			model = Mariner5_Solar_Antenna_Straight
			model = Mariner69_SolarPanel
			model = Mariner71_SolarPanel
			model = Mariner71_SolarAntenna
			model = mariner10_solar_Angled
			model = mariner10_solar_Straight
		}
		
		@CORE:HAS[#variant[Ranger]]
		{
			model = Ranger_Solar_Angled
			model = Ranger_Solar_Straight
			model = Ranger_Solar_AngledR
			model = Ranger_Solar_StraightR
			model = Ranger_TrackingSolar_Angled
			model = Ranger_TrackingSolar_Straight
			model = MarinerB_Solar_Angled
			model = MarinerB_Solar_Straight
			model = MarinerB_Solar_AngledR
			model = MarinerB_Solar_StraightR
			model = MarinerB_TrackingSolar_Angled
			model = MarinerB_TrackingSolar_Straight
			model = Ranger_Lander_Solar_Fixed
			model = Ranger_Lander_Solar_Tracking
		}
	}
}




