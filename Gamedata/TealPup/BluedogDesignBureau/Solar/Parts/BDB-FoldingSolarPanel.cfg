@PART[ROS-FoldingSolarPanel]:NEEDS[Bluedog_DB]:BEFORE[ROSolar]
{
	@MODULE[ModuleROSolar]:HAS[!CORE:HAS[#variant[Manned_Orbital_Laboratory]]]
	{
		CORE
		{
			variant = Manned_Orbital_Laboratory
		}
	}
}

@PART[ROS-FoldingSolarPanel]:NEEDS[Bluedog_DB]:AFTER[ROSolar]
{
	@MODULE[ModuleROSolar]
	{
		@CORE:HAS[#variant[Manned_Orbital_Laboratory]]
		{
			//model = Gemini_SolarWing_Right
			//model = Gemini_SolarWing_Left
