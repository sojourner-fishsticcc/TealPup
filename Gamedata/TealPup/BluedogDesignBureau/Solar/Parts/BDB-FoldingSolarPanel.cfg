@PART[ROS-FoldingSolarPanel]:NEEDS[Bluedog_DB]:BEFORE[ROSolar]
{
	@MODULE[ModuleROSolar]:HAS[!CORE:HAS[#variant[MannedOrbitalLaboratory]]]
	{
		CORE
		{
			variant = MannedOrbitalLaboratory
		}
	}
}

@PART[ROS-FoldingSolarPanel]:NEEDS[Bluedog_DB]:AFTER[ROSolar]
{
	@MODULE[ModuleROSolar]
	{
		@CORE:HAS[#variant[MannedOrbitalLaboratory]]
		{
			model = Gemini_LargeFixedArray_Right
			model = Gemini_LargeFixedArray_Left
			model = Tianja_SmallFixedSolar
			model = Tianja_SmallRotatingSolar
			model = Tianja_LargeFixedSolar
			model = Tianja_LargeRotatingSolar
			model = MOL_Solar1
			model = MOL_Solar2_Square
			model = MOL_Solar2_Bevel
			model = Gemini_SolarWing_Right
			model = Gemini_SolarWing_Left
		}
	}
}