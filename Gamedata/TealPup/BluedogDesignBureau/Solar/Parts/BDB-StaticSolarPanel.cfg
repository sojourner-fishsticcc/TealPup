@PART[ROS-StaticSolarPanel]:NEEDS[Bluedog_DB]:BEFORE[ROSolar]
{
	@MODULE[ModuleROSolar]:HAS[!CORE:HAS[#variant[Flat]]]
	{
		CORE
		{
			variant = Flat
		}
	}
	@MODULE[ModuleROSolar]:HAS[!CORE:HAS[#variant[Angled]]]
	{
		CORE
		{
			variant = Angled
		}
	}
}

@PART[ROS-StaticSolarPanel]:NEEDS[Bluedog_DB]:AFTER[ROSolar]
{
	@MODULE[ModuleROSolar]
	{
		@CORE:HAS[#variant[Flat]]
		{
			model = BDBSmallSquarePanel
			model = VoyagerMarsOrbiter_solarFlat
		}
	}
}

@PART[ROS-StaticSolarPanel]:NEEDS[Bluedog_DB]:AFTER[ROSolar]
{
	@MODULE[ModuleROSolar]
	{
		@CORE:HAS[#variant[Angled]]
		{
			model = VoyagerMarsOrbiter_annularSolarPanel
		}
	}
}